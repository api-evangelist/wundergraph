    description: >-
      The WunderGraph Cosmo Platform API provides programmatic access to manage
      federated GraphQL architectures at scale. It powers the Cosmo CLI (wgc)
      and Cosmo Studio, enabling management of federated graphs, subgraphs,
      namespaces, schema contracts, feature flags, router configurations, and
      API keys. The platform includes schema registry, composition checks,
      analytics, metrics, tracing, and routing capabilities.
