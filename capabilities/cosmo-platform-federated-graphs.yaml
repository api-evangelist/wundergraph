        idempotent: false
      call: cosmo-platform-federated-graphs.createfederatedgraph
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: wundergraph-get-federated-graph
      description: WunderGraph Get a federated graph
      hints:
